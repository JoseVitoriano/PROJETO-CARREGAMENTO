<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Cargas</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="cadastro">
  <header class="topbar">
    <h1>Cadastro de Cargas</h1>
    <nav>
      <a href="index.html">Cadastro</a>
      <a href="dados.html">Tabela</a>
      <a href="indicadores.html">Indicadores</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Novo registro</h2>
      <form id="cargoForm" class="grid">
        <input id="nomeDeposito" placeholder="Nome do depósito" required />
        <input id="nomeMotorista" placeholder="Nome do motorista" required />
        <input id="cubagem" type="number" step="0.01" placeholder="Cubagem" required />
        <input id="perfilCarro" placeholder="Perfil do carro" required />
        <input id="dataExpedicao" type="date" required />
        <button type="submit" class="btn">Salvar</button>
      </form>

      <div class="actions">
        <a class="btn secondary" href="dados.html">Ver tabela</a>
        <a class="btn secondary" href="indicadores.html">Ver indicadores</a>
        <button class="btn secondary" id="exportBtn">Exportar Excel</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
