<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Carregamento</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Cadastro de Carregamento</h1>
    <nav>
      <a href="../html/index.html">Cadastro</a>
      <a href="../html/painel.html">Tabela</a>
      <a href="../html/indicadores.html">Indicadores</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Novo Cadastro</h2>

      <form id="formCadastro">
        <div class="grid">
          <div class="field">
            <label for="deposito">Nome do depósito</label>
            <select name="" id="" required>
              <option value="">SELECIONE...</option>
              <option value="">ARD</option>
              <option value="">BCD</option>
              <option value="">BDE</option>
              <option value="">CAD</option>
              <option value="">CDE</option>
              <option value="">CDF</option>
              <option value="">CDP</option>
              <option value="">CHD</option>
              <option value="">DAB</option>
              <option value="">DAG</option>
              <option value="">DBC</option>
              <option value="">DBH</option>
              <option value="">DBJ</option>
              <option value="">DCO</option>
              <option value="">DPC</option>
              <option value="">DPI</option>
              <option value="">DPU</option>
              <option value="">DSI</option>
              <option value="">DPG</option>
              <option value="">DVG</option>
              <option value="">DZE</option>
              <option value="">FLD</option>
              <option value="">IDC</option>
              <option value="">LED</option>
              <option value="">OEI</option>
              <option value="">PAR</option>
              <option value="">PDC</option>
              <option value="">PDE</option>
              <option value="">PDF</option>
              <option value="">PID</option>
              <option value="">ROS</option>
              <option value="">SRD</option>
              <option value="">TDC</option>
              <option value="">TUD</option>

            </select>
          </div>

          <div class="field">
            <label for="motorista">Nome do motorista</label>
            <input type="text" id="motorista" required />
          </div>

          <div class="field">
            <label for="perfilVeiculo">Perfil do veículo</label>
            <select name="" id="" required>
              <option value="">SELECIONE...</option>
              <option value="">3/4</option>
              <option value="">TOCO</option>
              <option value="">TRUCK</option>
              <option value="">CARRETA</option>
              <option value="">BI_TREM</option>
              <option value="">RODO_TREM</option>
            </select>
          </div>

          <div class="field">
            <label for="cubagem">Cubagem do veículo</label>
            <input type="number" id="cubagem" step="0.01" required />
          </div>

          <div class="field">
            <label for="dataConclusao">Data conclusão de carregamento</label>
            <input type="date" id="dataConclusao" required />
          </div>
        </div>

        <button type="submit" class="btn">Salvar cadastro</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
