<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Carga</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="editar">
  <header class="topbar">
    <h1>Editar Registro</h1>
    <nav>
      <a href="../html/index.html">Cadastro</a>
      <a href="../html/painel.html">Tabela</a>
      <a href="../html/indicadores.html">Indicadores</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <form id="editForm" class="grid">
        <input id="nomeDeposito" placeholder="Nome do depósito" required />
        <input id="nomeMotorista" placeholder="Nome do motorista" required />
        <input id="cubagem" type="number" step="0.01" placeholder="Cubagem" required />
        <input id="perfilCarro" placeholder="Perfil do carro" required />
        <input id="dataExpedicao" type="date" required />
        <button type="submit" class="btn">Salvar alterações</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
